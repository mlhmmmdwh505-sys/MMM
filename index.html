<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم د. ملهم</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<h1 id="welcomeTitle">لوحة تحكم د. ملهم ممدوح 🩺</h1>

<div class="settings-bar card">
    <div class="setting-item">
        <label>الاسم</label>
        <input type="text" id="userNameInput" placeholder="اكتب اسمك هنا" class="num-input" style="width: 120px;">
    </div>
    <div class="setting-item">
        <label>اللون</label>
        <input type="color" id="colorPicker" value="#6366f1">
    </div>
    </div>
    <div class="top-bar">
        <div class="coins-container">
            <button class="trash-btn" onclick="resetPoints()">🗑️</button>
            <span id="coinCount">1000</span>
            <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" width="30" alt="coins">
        </div>
    </div>

    <div class="timer-section">
        <h1 id="pomoDisplay">25:00</h1>
        <div class="timer-controls">
            <button class="btn-start" onclick="startTimer()">ابدأ المهمة</button>
            <button class="btn-reset" onclick="resetTimer()">إعادة ضبط</button>
        </div>
    </div>

    <div class="shop-section">
        <h3>☕ متجر الطاقة (1د = 15ن)</h3>
        <div class="shop-items">
            <div class="item">5 دق 75ن</div>
            <div class="item">10 دق 150ن</div>
            <div class="item">15 دق 225ن</div>
        </div>
    </div>

    <div class="grad-section">
        <h3>🎓 حلم التخرج</h3>
        <div class="countdown">
            <div><span id="years">00</span> سنة</div>
            <div><span id="days">00</span> يوم</div>
            <div><span id="hours">00</span> ساعة</div>
        </div>
    </div>

    <div class="settings-section">
        <input type="number" class="minutes-input" placeholder="الدقائق" value="25">
        <input type="color" id="colorPicker" value="#00ff88">
        <input type="date" id="gradDate">
        <button class="btn-save">تأكيد الإعدادات</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
